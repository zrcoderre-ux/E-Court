<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Order Template Input</title>
  <style>
    :root {
      --navy: #1a365d;
      --navy-hover: #2a4a7f;
      --parchment: #f5f0e8;
      --line: #c8b89a;
      --ink: #1a1a2e;
    }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--parchment);
      color: var(--ink);
      font-family: 'Georgia', serif;
    }
    .wrap {
      max-width: 620px;
      margin: 0 auto;
      padding: 20px 24px 32px;
    }
    h1 {
      font-size: 18px;
      color: var(--navy);
      margin: 0 0 4px 0;
    }
    .sub {
      font-size: 12px;
      color: #6b5d47;
      margin: 0 0 16px 0;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
    }
    .field {
      margin-bottom: 14px;
    }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: bold;
      color: var(--navy);
      margin-bottom: 4px;
    }
    .field.movant label::after {
      content: ' — auto-detected; edit if needed';
      font-weight: normal;
      font-style: italic;
      color: #8a7a5c;
    }
    input, textarea {
      width: 100%;
      box-sizing: border-box;
      font-family: 'Georgia', serif;
      font-size: 13px;
      color: var(--ink);
      background: #fffdf9;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 7px 9px;
      resize: vertical;
    }
    textarea { min-height: 46px; line-height: 1.4; }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--navy);
      box-shadow: 0 0 0 2px rgba(26, 54, 93, 0.15);
    }
    .field.movant input { background: #fff8e8; border-color: #d9c48f; }
    .autorun {
      margin-top: 18px;
      font-size: 12px;
      color: #4a3f2c;
    }
    .autorun label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    .autorun input { width: auto; }
    .warning {
      margin-top: 14px;
      padding: 11px 13px;
      background: #fbeaea;
      border: 1px solid #d99;
      border-radius: 4px;
      color: #7a1f1f;
      font-size: 12px;
    }
    .warning p { margin: 0 0 9px 0; line-height: 1.4; }
    .warning .warn-actions { display: flex; gap: 8px; }
    .warning button { width: auto; padding: 6px 12px; font-size: 12px; margin: 0; }
    .warning button.danger { background: #c0392b; color: #fff; }
    .warning button.danger:hover { background: #a83227; }
    .warning button.ghost {
      background: transparent; color: #7a1f1f; border: 1px solid #d99;
    }
    .warning button.ghost:hover { background: #f3d9d9; }
    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 14px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }
    button {
      font-family: 'Georgia', serif;
      font-size: 13px;
      padding: 10px 18px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button.primary { background: var(--navy); color: #fff; }
    button.primary:hover { background: var(--navy-hover); }
    button.secondary {
      background: transparent;
      color: var(--navy);
      border: 1px solid var(--line);
    }
    button.secondary:hover { background: #ece3d3; }
    .status {
      font-size: 12px;
      color: #6b5d47;
      margin-left: auto;
      min-height: 16px;
    }
    .status.success { color: #1a6b3a; }
    .status.error { color: #c0392b; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>&#9878;&#65039; Order Template Input</h1>
    <p class="sub">Review and edit the fields below, then download the spreadsheet for your Word mail merge.</p>

    <div id="fields"></div>

    <div class="autorun">
      <label>
        <input type="checkbox" id="autoRun" checked>
        Run the Word mail merge automatically after download
      </label>
    </div>

    <div class="warning" id="pdfWarning" hidden>
      <p>No PDF has been downloaded from the court website since your last
        export. The mail merge may have no documents to file into the case
        folder. Did you forget to save the case PDFs?</p>
      <div class="warn-actions">
        <button id="pdfDownloadAnyway" class="danger">Download anyway</button>
        <button id="pdfDismiss" class="ghost">Cancel</button>
      </div>
    </div>

    <div class="actions">
      <button id="downloadBtn" class="primary">Download Spreadsheet</button>
      <button id="closeBtn" class="secondary">Close</button>
      <span class="status" id="status"></span>
    </div>
  </div>

  <script src="order-template.js"></script>
</body>
</html>
